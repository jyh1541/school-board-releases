<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없어요 (404) - 스쿨보드</title>
  <meta name="description" content="요청하신 페이지를 찾을 수 없습니다. 스쿨보드 홈으로 돌아가세요.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#4f46e5">
  <link rel="icon" href="/icon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fdfbf6;
      --bg-2: #f6f1e8;
      --ink: #0d0d14;
      --ink-3: #6b6779;
      --line: #e8e1d3;
      --paper: #ffffff;
      --indigo: #4f46e5;
      --violet: #8b5cf6;
      --grad-hero: linear-gradient(120deg, #4f46e5 0%, #8b5cf6 35%, #ec4899 70%, #fb923c 100%);
      --shadow-lg: 0 30px 80px -20px rgba(79, 70, 229, 0.22);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a14;
        --bg-2: #11111e;
        --ink: #f5f1e8;
        --ink-3: #9c98ad;
        --line: #1f1d2e;
        --paper: #14131f;
        --shadow-lg: 0 30px 80px -20px rgba(139, 92, 246, 0.4);
      }
    }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background:
        radial-gradient(60% 60% at 50% 0%, rgba(139, 92, 246, 0.10), transparent 70%),
        var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      line-height: 1.6;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }
    .card {
      width: 100%;
      max-width: 520px;
      text-align: center;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 48px 32px 40px;
      box-shadow: var(--shadow-lg);
    }
    .code {
      font-size: clamp(72px, 18vw, 120px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      background: var(--grad-hero);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: var(--ink-3);
      font-size: 15px;
      margin-bottom: 32px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 24px;
      border-radius: 999px;
      text-decoration: none;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .btn-primary {
      color: #fff;
      background: var(--indigo);
      box-shadow: 0 12px 28px -10px rgba(79, 70, 229, 0.6);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 18px 34px -10px rgba(79, 70, 229, 0.7); }
    .btn-ghost {
      color: var(--ink);
      background: var(--bg-2);
      border: 1px solid var(--line);
    }
    .btn-ghost:hover { transform: translateY(-2px); }
    .brand {
      margin-top: 28px;
      font-size: 13px;
      color: var(--ink-3);
    }
    .brand b { color: var(--ink); font-weight: 700; }
  </style>
</head>
<body>
  <main class="card">
    <div class="code">404</div>
    <h1>페이지를 찾을 수 없어요</h1>
    <p>요청하신 주소가 바뀌었거나 더 이상 존재하지 않습니다.<br>아래 버튼으로 스쿨보드 홈에서 다시 시작해 보세요.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">🏠 홈으로 돌아가기</a>
      <a class="btn btn-ghost" href="/#download">스쿨보드 다운로드</a>
    </div>
    <div class="brand"><b>스쿨보드</b> · 교사용 올인원 바탕화면 위젯</div>
  </main>
</body>
</html>
